name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tgatlas/package-lock.json

      - name: Install tgatlas dependencies
        run: npm ci
        working-directory: tgatlas

      - name: Build tgatlas
        run: npm run build
        working-directory: tgatlas

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build Jekyll root site
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Assemble final site
        run: |
          mkdir -p _deploy
          cp -r _site/. _deploy/
          cp -r tgatlas/dist _deploy/tgatlas

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
